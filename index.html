<!DOCTYPE html>
<html>
<head>
    <title>Cube Scramble Generator</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .scramble { font-weight: bold; color: blue; }
        .error { color: red; font-weight: bold; }
        svg { max-width: 200px; }
    </style>
</head>
<body>
    <h1>Cube Scramble Generator</h1>
    <div id="output"></div>

    <script src="cstimer_module.js"></script>
    <script>
        cstimerWorker.getScramble('333').then(function(scrambleStr) {
            alert('Scramble:', scrambleStr);
            
            // Display on page
            var div = document.createElement('div');
            div.className = 'result';
            div.innerHTML = '<div class="scramble">3x3x3 Scramble:</div>' + scrambleStr;
            document.getElementById('output').appendChild(div);
            
            return cstimerWorker.getImage(scrambleStr, '333');
        }).then(function(svgImage) {
            alert('Image generated');
            
            // Display image on page
            var div = document.createElement('div');
            div.className = 'result';
            div.innerHTML = svgImage;
            document.getElementById('output').appendChild(div);
        }).catch(function(error) {
            console.error('Error:', error);
            
            // Display error on page
            var div = document.createElement('div');
            div.className = 'result error';
            div.innerHTML = 'Error: ' + (error.message || error);
            document.getElementById('output').appendChild(div);
        });
    </script>
</body>
</html>
